button,
[type="button"],
[type="submit"],

	display: inline-flex;

	font-size: inherit;
	padding: 0;
	border-radius: 0;
	background: none;
}

main {
	max-width: var(--notion-page-width);
	margin: 0 auto;
	padding: 76px 24px 88px;
}

section {
	margin-top: 44px;
}
section:first-child {
	margin-top: 0;
}

/* -- Page shell ------------------------------------------- */
.notion-shell {
	max-width: var(--notion-page-width);
	margin: 0 auto;
	padding: 76px 24px 88px;
}

/* -- Tiny utilities --------------------------------------- */
.notion-lede {
	max-width: 720px;
	margin: 0 0 24px;
	color: var(--notion-text-soft);
	font-size: 20px;
}
.notion-muted {
	color: var(--notion-text-soft);
}
.notion-faint {
	color: var(--notion-text-faint);
}
.notion-divider {
	height: 1px;
	margin: 34px 0;
	background: var(--notion-border-soft);
}
.notion-eyebrow {
	display: inline-block;
	font-size: 12px;
	font-weight: 600;
	letter-spacing: 0.0078125rem;
	text-transform: uppercase;
	color: var(--notion-blue);
}

/* -- Footer ----------------------------------------------- */
.notion-footer {
	margin-top: 52px;
	padding-top: 18px;
	border-top: 1px solid var(--notion-border-soft);
	color: var(--notion-text-faint);
	font-size: 13px;
}

/* -- Accessibility & motion ------------------------------- */
@media (prefers-reduced-motion: reduce) {
	*,
	*::before,
	*::after {
		animation-duration: 0.01ms !important;
		animation-iteration-count: 1 !important;
		transition-duration: 0.01ms !important;
	}
}

/* -- Responsive: 560px (base elements) -------------------- */
@media (max-width: 560px) {
	main,
	.notion-shell {
		padding-inline: 16px;
	}
	table {
		display: block;
		overflow-x: auto;
	}
}

/*
 * hero — Full-width hero section with title, subtitle, and optional eyebrow.
 *
 * HTML:
 * <section class="notion-hero">
 *   <span class="notion-eyebrow">Category</span>
 *   <h1>Page Title</h1>
 *   <p>A brief description that supports the title with additional context.</p>
 *   <div class="notion-button-group">
 *     <a class="notion-button" data-variant="primary" href="#">Get started</a>
 *     <a class="notion-button" data-variant="secondary" href="#">Learn more</a>
 *   </div>
 * </section>
 */

.notion-hero {
	padding: 48px 0 40px;
	max-width: var(--notion-page-width);
}
.notion-hero h1 {
	font-size: clamp(42px, 7vw, 72px);
	font-weight: 700;
	letter-spacing: -0.04em;
	line-height: 1.05;
	margin: 0;
	text-wrap: balance;
}
.notion-hero p {
	font-size: 20px;
	line-height: 1.5;
	color: var(--notion-text-soft);
	margin: 16px 0 0;
	max-width: 640px;
}
.notion-hero .notion-eyebrow {
	margin-bottom: 12px;
}

/* -- Responsive: 820px ------------------------------------ */
@media (max-width: 820px) {
	.notion-hero {
		padding: 32px 0 24px;
	}
	.notion-hero h1 {
		font-size: clamp(32px, 8vw, 48px);
	}
}

/*
 * callout — Highlighted info box with icon and text.
 * Options: data-tone="blue" | "green" | "orange" | "red" (default: yellow)
 *
 * HTML:
 * <div class="notion-callout" data-tone="blue">
 *   <div>💡</div>
 *   <div><strong>Note</strong><p>Helpful context.</p></div>
 * </div>
 */

.notion-callout {
	display: grid;
	grid-template-columns: auto 1fr;
	gap: 14px;
	margin: 18px 0;
	padding: 16px 18px;
	border-radius: var(--notion-radius);
	background: var(--notion-yellow-bg);
	box-shadow: inset 0 0 0 1px var(--notion-border-soft);
}
.notion-callout[data-tone="blue"] {
	background: var(--notion-blue-bg);
}
.notion-callout[data-tone="green"] {
	background: var(--notion-green-bg);
}
.notion-callout[data-tone="orange"] {
	background: var(--notion-orange-bg);
}
.notion-callout[data-tone="red"] {
	background: var(--notion-red-bg);
}
.notion-callout strong {
	display: block;
	margin-bottom: 3px;
}
.notion-callout p {
	margin: 0;
	color: var(--notion-text-soft);
}

/*
 * card-grid — Grid of clickable cards with icon, title, and description.
 *
 * HTML:
 * <section class="notion-card-grid">
 *   <article class="notion-card">
 *     <div class="notion-card-icon">%</div>
 *     <h3>Card</h3>
 *     <p>Card text.</p>
 *   </article>
 * </section>
 */

.notion-card-grid {
	display: grid;
	grid-template-columns: repeat(3, minmax(0, 1fr));
	gap: 12px;
	margin: 20px 0 6px;
}
.notion-card {
	padding: 16px;
	border: 1px solid var(--notion-border-soft);
	border-radius: 10px;
	background: var(--notion-surface);
	box-shadow: var(--notion-shadow);
	transition:
		transform 140ms ease,
		background 140ms ease,
		border-color 140ms ease;
}
.notion-card:hover {
	transform: translateY(-1px);
	background: var(--notion-surface-hover);
	border-color: var(--notion-border);
}
.notion-card-icon {
	width: 34px;
	height: 34px;
	display: grid;
	place-items: center;
	margin-bottom: 12px;
	border-radius: 8px;
	background: var(--notion-gray-bg);
	font-size: 20px;
}
.notion-card p {
	color: var(--notion-text-soft);
}

/* -- Responsive: 820px ------------------------------------ */
@media (max-width: 820px) {
	.notion-card-grid {
		grid-template-columns: 1fr;
	}
}

/*
 * stat-grid — Grid of stat cards with label, big number, caption, and trend.
 *
 * HTML:
 * <section class="notion-stat-grid">
 *   <div class="notion-stat">
 *     <p class="notion-stat-label">Metric</p>
 *     <p class="notion-stat-value">42%</p>
 *     <p class="notion-stat-caption">Short explanation.</p>
 *     <span class="notion-stat-trend">&#x2197; trend</span>
 *   </div>
 * </section>
 */

.notion-stat-grid {
	display: grid;
	grid-template-columns: repeat(3, minmax(0, 1fr));
	gap: 12px;
	margin: 20px 0 6px;
}
.notion-stat {
	padding: 16px;
	border: 1px solid var(--notion-border-soft);
	border-radius: 10px;
	background: var(--notion-surface);
	box-shadow: var(--notion-shadow);
}
.notion-stat-label {
	margin: 0 0 6px;
	color: var(--notion-text-soft);
	font-size: 13px;
	font-weight: 600;
}
.notion-stat-value {
	margin: 0;
	font-size: 32px;
	line-height: 1.05;
	letter-spacing: -0.04em;
	font-weight: 700;
	font-variant-numeric: tabular-nums;
}
.notion-stat-caption {
	margin: 8px 0 0;
	color: var(--notion-text-soft);
	font-size: 13px;
}
.notion-stat-trend {
	display: inline-flex;
	align-items: center;
	gap: 4px;
	margin-top: 10px;
	padding: 3px 7px;
	border-radius: 999px;
	background: var(--notion-blue-bg);
	color: var(--notion-blue);
	font-size: 12px;
	font-weight: 650;
}

/* -- Responsive: 1080px ----------------------------------- */
@media (max-width: 1080px) {
	.notion-stat-grid {
		grid-template-columns: repeat(2, 1fr);
	}
}

/* -- Responsive: 820px ------------------------------------ */
@media (max-width: 820px) {
	.notion-stat-grid {
		grid-template-columns: 1fr;
	}
}

/*
 * meter — Single progress bar with label and percentage.
 * Options: data-tone="green" | "orange" | "red" (default: blue)
 *
 * HTML:
 * <div class="notion-meter" style="--value: 72%">
 *   <div class="notion-meter-row">
 *     <span>Progress</span>
 *     <span>72%</span>
 *   </div>
 *   <div class="notion-meter-track">
 *     <div class="notion-meter-fill"></div>
 *   </div>
 * </div>
 */

.notion-meter {
	--value: 50%;
	--meter-color: var(--notion-blue);
	display: grid;
	gap: 7px;
	margin: 12px 0;
}
.notion-meter-row {
	display: flex;
	align-items: center;
	justify-content: space-between;
	gap: 12px;
	color: var(--notion-text-soft);
	font-size: 13px;
	font-weight: 600;
}
.notion-meter-track {
	height: 9px;
	overflow: hidden;
	border-radius: 999px;
	background: var(--notion-gray-bg);
	box-shadow: inset 0 0 0 1px var(--notion-border-soft);
}
.notion-meter-fill {
	height: 100%;
	width: var(--value);
	border-radius: 999px;
	background: var(--meter-color);
}
.notion-meter[data-tone="green"] {
	--meter-color: var(--notion-chart-3);
}
.notion-meter[data-tone="orange"] {
	--meter-color: var(--notion-chart-5);
}
.notion-meter[data-tone="red"] {
	--meter-color: var(--notion-chart-8);
}

/*
 * toggle — Alias for the base <details> element.
 * No additional styles beyond _base.css defaults.
 *
 * HTML:
 * <details class="notion-toggle">
 *   <summary>More detail</summary>
 *   <p>Hidden content.</p>
 * </details>
 */

/* .notion-toggle is now an alias -- bare <details> is styled identically */

/* App-specific supplemental styles */
.app-header{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--notion-bg) 88%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--notion-border-soft);}
.app-bar{max-width:var(--notion-page-width);margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:14px;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;cursor:pointer;}
.brand .flag{font-size:22px;}
.app-bar .spacer{flex:1;}
.ghost-btn{background:transparent;color:var(--notion-text-soft);border:1px solid var(--notion-border);}
.ghost-btn:hover{background:var(--notion-surface-hover);color:var(--notion-text);}

.crumb{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--notion-text-soft);background:transparent;border:none;padding:6px 0;cursor:pointer;}
.crumb:hover{color:var(--notion-text);background:transparent;}

/* Status pills */
.pills{display:inline-flex;gap:6px;flex-wrap:wrap;}
.pill{font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px;border:1px solid var(--notion-border);background:var(--notion-surface);color:var(--notion-text-soft);cursor:pointer;transition:all 120ms;line-height:1.1;}
.pill:hover{background:var(--notion-surface-hover);}
.pill[data-active="true"][data-s="new"]{background:var(--notion-red-bg);border-color:var(--notion-red);color:var(--notion-red);}
.pill[data-active="true"][data-s="learning"]{background:var(--notion-orange-bg);border-color:var(--notion-orange);color:var(--notion-orange);}
.pill[data-active="true"][data-s="known"]{background:var(--notion-green-bg);border-color:var(--notion-chart-3);color:#2b8a3e;}
@media (prefers-color-scheme: dark){.pill[data-active="true"][data-s="known"]{color:var(--notion-chart-3);}}

.dot{display:inline-block;width:9px;height:9px;border-radius:50%;}
.dot.new{background:var(--notion-red);}
.dot.learning{background:var(--notion-orange);}
.dot.known{background:var(--notion-chart-3);}

/* Word card */
.word-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.word-card{border:1px solid var(--notion-border-soft);border-radius:12px;background:var(--notion-surface);padding:14px 16px;box-shadow:var(--notion-shadow);}
.word-card[data-s="new"]{border-left:4px solid var(--notion-red);}
.word-card[data-s="learning"]{border-left:4px solid var(--notion-orange);}
.word-card[data-s="known"]{border-left:4px solid var(--notion-chart-3);}
.word-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.word-en{font-size:20px;font-weight:700;letter-spacing:-0.01em;}
.word-ipa{color:var(--notion-text-faint);font-size:14px;}
.word-ru{font-size:16px;color:var(--notion-text);}
.word-ex{margin-top:4px;color:var(--notion-text-soft);font-size:14px;font-style:italic;}
.word-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
.speak{background:transparent;color:var(--notion-text-soft);border:1px solid var(--notion-border);padding:6px 10px;font-size:13px;}
.speak:hover{background:var(--notion-surface-hover);color:var(--notion-text);}

/* Lesson cards */
.lesson-card{display:flex;flex-direction:column;gap:8px;border:1px solid var(--notion-border-soft);border-radius:12px;background:var(--notion-surface);padding:16px;box-shadow:var(--notion-shadow);cursor:pointer;transition:transform 120ms,border-color 120ms;}
.lesson-card:hover{transform:translateY(-2px);border-color:var(--notion-border);}
.lesson-card h3{margin:0;}
.lesson-meta{display:flex;gap:8px;align-items:center;color:var(--notion-text-soft);font-size:13px;}
.mini-track{height:6px;border-radius:999px;background:var(--notion-border-soft);overflow:hidden;margin-top:4px;}
.mini-fill{height:100%;background:var(--notion-chart-3);border-radius:999px;}

/* Flashcards */
.flash-wrap{border:1px solid var(--notion-border-soft);border-radius:16px;background:var(--notion-bg-soft);padding:22px;text-align:center;box-shadow:var(--notion-shadow);}
.flash-progress{font-size:13px;color:var(--notion-text-soft);margin-bottom:14px;}
.flash-card{min-height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px;background:var(--notion-surface);border:1px solid var(--notion-border);border-radius:14px;}
.flash-prompt-label{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--notion-text-faint);}
.flash-main{font-size:30px;font-weight:700;letter-spacing:-0.02em;}
.flash-sub{color:var(--notion-text-soft);}
.flash-ipa{color:var(--notion-text-faint);font-size:15px;}
.flash-ex{font-style:italic;color:var(--notion-text-soft);font-size:14px;margin-top:4px;}
.flash-actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
.btn-bad{background:var(--notion-red);}.btn-bad:hover{background:color-mix(in srgb,var(--notion-red) 82%,black);}
.btn-good{background:var(--notion-chart-3);}.btn-good:hover{background:color-mix(in srgb,var(--notion-chart-3) 82%,black);}
.tag-check{display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--notion-blue);background:var(--notion-blue-bg);padding:3px 8px;border-radius:6px;margin-bottom:6px;}

.section-head{display:flex;align-items:center;gap:10px;margin:34px 0 6px;}
.section-head h2{margin:0;font-size:22px;}
.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--notion-text-soft);font-size:13px;margin-top:6px;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.empty-note{color:var(--notion-text-soft);font-size:14px;padding:10px 0;}
.done-banner{margin-top:8px;}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}

/* Badge (supplemental) */
.notion-badge{display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px;background:var(--notion-gray-bg);color:var(--notion-text-soft);white-space:nowrap;}
.notion-badge[data-variant="blue"]{background:var(--notion-blue-bg);color:var(--notion-blue);}

/* Stepper */
.stepper{display:flex;align-items:center;gap:8px;color:var(--notion-text-faint);font-size:13px;margin-top:10px;flex-wrap:wrap;}
.step.on{color:var(--notion-blue);font-weight:700;}
.step-sep{opacity:.5;}

/* Sequence progress */
.seq-bar{height:8px;border-radius:999px;background:var(--notion-border-soft);overflow:hidden;margin:12px 0 6px;}
.seq-fill{height:100%;background:var(--notion-blue);border-radius:999px;transition:width 220ms;}
.seq-count{font-size:13px;color:var(--notion-text-soft);}

/* Big word/test card */
.card-big{border:1px solid var(--notion-border-soft);border-radius:18px;background:var(--notion-surface);box-shadow:var(--notion-shadow);padding:30px 26px;text-align:center;}
.card-big .w-en{font-size:clamp(34px,7vw,46px);font-weight:800;letter-spacing:-0.02em;line-height:1.05;}
.card-big .w-ipa{color:var(--notion-text-faint);font-size:17px;margin-top:4px;}
.card-big .w-ru{font-size:22px;margin-top:12px;font-weight:600;}
.card-big .w-ex{margin-top:18px;font-size:18px;}
.card-big .w-exru{color:var(--notion-text-soft);font-size:15px;margin-top:3px;font-style:italic;}
.speak-lg{margin-top:14px;background:transparent;color:var(--notion-blue);border:1px solid var(--notion-border);}
.speak-lg:hover{background:var(--notion-blue-bg);}

/* Status buttons in sequence */
.status-btns{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
.status-btns button{min-width:130px;font-size:15px;padding:11px 16px;}
.s-new{background:var(--notion-red);}.s-new:hover{background:color-mix(in srgb,var(--notion-red) 82%,black);}
.s-learn{background:var(--notion-orange);}.s-learn:hover{background:color-mix(in srgb,var(--notion-orange) 82%,black);}
.s-known{background:var(--notion-chart-3);}.s-known:hover{background:color-mix(in srgb,var(--notion-chart-3) 82%,black);}
.seq-nav{display:flex;justify-content:center;margin-top:14px;}
.seq-nav button{background:transparent;color:var(--notion-text-soft);border:1px solid var(--notion-border);font-size:13px;}
.seq-nav button:hover{background:var(--notion-surface-hover);color:var(--notion-text);}

/* Test */
.qprompt-label{font-size:13px;text-transform:uppercase;letter-spacing:0.05em;color:var(--notion-text-faint);}
.qprompt-main{font-size:clamp(26px,5vw,34px);font-weight:800;margin-top:6px;letter-spacing:-0.01em;}
.qprompt-sub{color:var(--notion-text-soft);margin-top:4px;}
.opts{display:flex;flex-direction:column;gap:10px;max-width:520px;margin:20px auto 0;}
.opt{width:100%;justify-content:flex-start;background:var(--notion-surface);color:var(--notion-text);border:1px solid var(--notion-border);font-size:15px;padding:13px 16px;}
.opt:hover{background:var(--notion-surface-hover);}
.opt:disabled{cursor:default;opacity:1;}
.opt-correct{background:var(--notion-green-bg)!important;border-color:var(--notion-chart-3)!important;color:#2b8a3e!important;}
.opt-wrong{background:var(--notion-red-bg)!important;border-color:var(--notion-red)!important;color:var(--notion-red)!important;}
@media (prefers-color-scheme: dark){.opt-correct{color:var(--notion-chart-3)!important;}}
.ans-input{max-width:380px;margin:18px auto 0;display:flex;gap:10px;}
.ans-input input{flex:1;text-align:center;font-size:18px;}
.feedback{margin-top:18px;font-weight:700;font-size:16px;}
.feedback.ok{color:#2b8a3e;}
.feedback.no{color:var(--notion-red);}
.feedback small{display:block;font-weight:500;color:var(--notion-text-soft);margin-top:4px;}
.test-actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.score-num{font-size:64px;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.missed-list{max-width:520px;margin:16px auto 0;text-align:left;display:flex;flex-direction:column;gap:8px;}
.missed-row{display:flex;gap:10px;align-items:baseline;border:1px solid var(--notion-border-soft);border-radius:10px;padding:10px 14px;background:var(--notion-surface);}
.missed-row b{font-size:16px;}

/* Backup / progress transfer */
.backup-box{margin:14px 0 6px;}
.backup-box textarea{width:100%;min-height:90px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;padding:12px 14px;border:1px solid var(--notion-border);border-radius:10px;background:var(--notion-surface);color:var(--notion-text);box-sizing:border-box;}
.backup-box textarea:focus{outline:none;border-color:var(--notion-blue);}
.file-label{display:inline-flex;align-items:center;cursor:pointer;}

.lesson-top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}

.rev-input{width:100%;max-width:360px;margin:8px auto 0;display:block;text-align:center;font-size:20px;padding:12px 16px;border:1px solid var(--notion-border);border-radius:10px;background:var(--notion-surface);color:var(--notion-text);box-sizing:border-box;}
.rev-input:focus{outline:none;border-color:var(--notion-blue);box-shadow:0 0 0 3px rgba(39,131,222,.18);}
.rev-fb{font-weight:600;margin-bottom:8px;}
.rev-fb.good{color:#3aa76d;}
.rev-fb.bad{color:#e0556a;}
.rev-rate-q{flex-basis:100%;width:100%;text-align:center;opacity:.7;font-size:14px;margin-bottom:2px;}
.flash-actions{flex-wrap:wrap;}
.btn-warn{background:#e8a13a;color:#1b1300;border:none;}
.btn-warn:hover{filter:brightness(1.05);}
.menu-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px;}
.menu-btn{display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:16px 18px;border:1px solid var(--notion-border);border-radius:12px;background:var(--notion-surface);color:var(--notion-text);cursor:pointer;font-size:16px;transition:border-color .15s,transform .05s;}
.menu-btn:hover{border-color:var(--notion-blue);}
.menu-btn:active{transform:scale(.99);}
.menu-btn.primary{border-color:var(--notion-blue);background:rgba(39,131,222,.06);}

</style></head><body>
<header class="app-header">
	<div class="app-bar">
		<div class="brand" onclick="go('home')"><span class="flag">🇬🇧</span> Английский</div>
		<div class="spacer"></div>
		<button class="ghost-btn" onclick="go('backup')">💾 Прогресс</button>
		<button class="ghost-btn" onclick="resetProgress()">Сбросить</button>
	</div>
</header>
<main class="notion-shell" id="app"></main>
<script>
/* ============================================================
   ДАННЫЕ КУРСА — наполняй здесь.
   Урок: { id, title, theme, phase, words:[{w, ipa, ru, ex, exRu, img?}] }  img? = ключ для картинки (по умолчанию = w)
   ============================================================ */
const COURSE = {
  intervals: [1,3,7,14,30],
  randomKnownCheck: 5,
  lessons: (typeof LESSONS_DATA!=="undefined"?LESSONS_DATA:[])
};

/* ============================ STATE ============================ */
const SKEY="engb1_state_v3";
const DAY=86400000;
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(SKEY))||{words:{}};}catch(e){return {words:{}};}}
var __cloudT=null;
function tgCloud(){var t=window.Telegram&&window.Telegram.WebApp;return (t&&t.CloudStorage&&t.initData)?t.CloudStorage:null;}
function chunkStr(s,n){var a=[];for(var i=0;i<s.length;i+=n){a.push(s.slice(i,i+n));}return a;}
function save(){var v=JSON.stringify(state);try{localStorage.setItem(SKEY,v);}catch(e){}cloudSave(v);}
function cloudSave(v){var cs=tgCloud();if(!cs){return;}clearTimeout(__cloudT);__cloudT=setTimeout(function(){var parts=chunkStr(v,3500);var n=parts.length;cs.getItem(SKEY+'_n',function(e,ov){var oldN=parseInt(ov,10);if(isNaN(oldN)){oldN=0;}cs.setItem(SKEY+'_n',String(n),function(){});for(var i=0;i<n;i++){cs.setItem(SKEY+'_'+i,parts[i],function(){});}for(var j=n;j<oldN;j++){cs.removeItem(SKEY+'_'+j,function(){});}});},500);}
function cloudLoad(cb){var cs=tgCloud();if(!cs){cb(null);return;}cs.getItem(SKEY+'_n',function(e,nv){var n=parseInt(nv,10);if(!n||isNaN(n)||n<1){cb(null);return;}var parts=new Array(n),got=0,bad=false;for(var i=0;i<n;i++){(function(idx){cs.getItem(SKEY+'_'+idx,function(er,val){if(er||val==null||val===''){bad=true;}parts[idx]=val||'';got++;if(got===n){cb(bad?null:parts.join(''));}});})(i);}});}
function ws(w){const k=w.toLowerCase();if(!state.words[k])state.words[k]={status:"new",box:0,due:0,seen:0};return state.words[k];}
const LABEL={new:"🟡 Учу",learning:"🟡 Учу",known:"🟢 Знаю"};
function setStatus(w,status){const s=ws(w);s.status=status;s.seen++;const now=Date.now();if(status==="known"){s.box=COURSE.intervals.length;s.due=now+30*DAY;}else if(status==="learning"){s.box=Math.max(1,s.box);s.due=now+COURSE.intervals[0]*DAY;}else{s.box=0;s.due=now;}save();}
function recall(w,ok){const s=ws(w);s.seen++;const now=Date.now();if(ok){s.box=Math.min(s.box+1,COURSE.intervals.length);if(s.box>=COURSE.intervals.length){s.status="known";}else if(s.status==="new"){s.status="learning";}s.due=now+COURSE.intervals[Math.min(s.box,COURSE.intervals.length-1)]*DAY;}else{s.box=0;s.status="learning";s.due=now+COURSE.intervals[0]*DAY;}save();}

/* ============================ HELPERS ============================ */
function allWords(){return COURSE.lessons.flatMap(l=>l.words);}
function wordsBefore(id){return COURSE.lessons.filter(l=>l.id<id).flatMap(l=>l.words);}
function wordsUpTo(id){return COURSE.lessons.filter(l=>l.id<=id).flatMap(l=>l.words);}
function counts(list){const c={new:0,learning:0,known:0};list.forEach(o=>c[ws(o.w).status]++);return c;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function norm(s){return (s||"").toLowerCase().trim().replace(/[.,!?;:]/g,"");}
function speak(w){try{const u=new SpeechSynthesisUtterance(w);u.lang="en-US";u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function findWord(w){return allWords().find(x=>x.w===w);}
function lessonLearned(l){return l.words.length>0&&l.words.every(o=>ws(o.w).status!=='new');}
function imgLock(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))>>>0;}return h%100000;}
function wordImg(o){const kw=encodeURIComponent(o.img||o.w);return `<div class="w-img-wrap"><img class="w-img" src="https://loremflickr.com/440/280/${kw}?lock=${imgLock(o.w)}" alt="${esc(o.w)}" loading="lazy" onerror="this.closest('.w-img-wrap').style.display='none'"></div>`;}

/* ============================ ROUTER ============================ */
let view={name:"home"};
let lesson=null;
let rnd=null;
function go(name,arg){view={name,arg};window.scrollTo(0,0);rerender();}
function rerender(){if(view.name==="lesson"&&lesson){if(lesson.stage==="done"){clearActive();}else{saveActive();}}document.getElementById("app").innerHTML = view.name==="lesson"?renderLesson():view.name==="random"?renderRandom():view.name==="backup"?renderBackup():renderHome();}

/* ============================ RANDOM REVIEW ============================ */
function startRandomReview(){const pool=allWords().filter(o=>ws(o.w).status==='new');if(!pool.length){alert('Нет невыученных слов для повторения 🎉');return;}rnd={ids:shuffle(pool).slice(0,10).map(o=>o.w),i:0,given:null,checked:false,correct:false};view={name:'random'};window.scrollTo(0,0);rerender();}
function checkRandom(){if(rnd.checked)return;const el=document.getElementById('rnd');const v=el?el.value:'';rnd.given=v;const w=rnd.ids[rnd.i];rnd.correct=norm(v)===norm(w);rnd.checked=true;if(rnd.correct){setStatus(w,'learning');}rerender();}
function nextRandom(){rnd.i++;rnd.given=null;rnd.checked=false;rnd.correct=false;window.scrollTo(0,0);rerender();}
function renderRandom(){if(rnd.i>=rnd.ids.length){return `<section><div class="lesson-top"><button class="crumb" onclick="go('home')">← На главную</button></div><div class="flash-wrap"><div class="flash-card"><div class="flash-main">✅</div><div class="flash-sub">Повторение завершено! Верно написанные слова перешли в статус «Учу».</div></div><div class="flash-actions"><button onclick="go('home')">Готово</button><button class="ghost-btn" onclick="startRandomReview()">🎲 Ещё 10</button></div></div></section>`;}const w=rnd.ids[rnd.i];const o=findWord(w);const prompt=`<div class="flash-prompt-label">переведи на английский</div><div class="flash-main">${esc(o.ru)}</div>`;let body,actions;if(!rnd.checked){body=`<input id="rnd" class="rev-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="напишите слово по-английски" onkeydown="if(event.key==='Enter'){event.preventDefault();checkRandom();}">`;actions=`<button onclick="checkRandom()">Проверить</button><button class="speak" onclick="speak('${o.w}')">🔊</button>`;}else{const fb=rnd.correct?`<div class="rev-fb good">✅ Верно! Слово перешло в «Учу».</div>`:`<div class="rev-fb bad">❌ Вы написали: <s>${esc(rnd.given||'—')}</s> · остаётся невыученным</div>`;body=`${fb}<div class="flash-main">${esc(o.w)}</div><div class="flash-ipa">${esc(o.ipa)}</div><div class="flash-sub">${esc(o.ru)}</div>`;actions=`<button onclick="nextRandom()">Дальше →</button><button class="speak" onclick="speak('${o.w}')">🔊</button>`;}return `<section><div class="lesson-top"><button class="crumb" onclick="go('home')">← На главную</button></div><div class="flash-wrap"><p class="flash-progress">Случайное повторение · ${rnd.i+1} / ${rnd.ids.length}</p><div class="flash-card">${prompt}${body}</div><div class="flash-actions">${actions}</div></div></section>`;}

/* ============================ HOME ============================ */
function renderHome(){
  const all=allWords();const c=counts(all);const total=all.length;const pct=total?Math.round(c.known/total*100):0;
  const FOLDER=10;
  const fIdx=COURSE.lessons.findIndex(l=>!lessonLearned(l));
  const activeFolder=fIdx<0?0:Math.floor(fIdx/FOLDER);
  const groups=COURSE.lessons.reduce((acc,l,i)=>{const f=Math.floor(i/FOLDER);(acc[f]=acc[f]||[]).push(l);return acc;},[]);
  const folders=groups.map((group,fi)=>{
    const fw=group.reduce((a,l)=>a+l.words.length,0);const fk=group.reduce((a,l)=>a+counts(l.words).known,0);const fp=fw?Math.round(fk/fw*100):0;
    const first=group[0].id,last=group[group.length-1].id;
    const cells=group.map(l=>{const lc=counts(l.words);const lp=Math.round(lc.known/l.words.length*100);const big=l.id%5===0;const cont=(state.active&&state.active.id===l.id&&state.active.stage&&state.active.stage!=='done');const done=lessonLearned(l);
      return `<button class="lcell${done?' done':''}" onclick="openLesson(${l.id})"><div class="lcell-top"><span class="lcell-num">${l.id}</span><span class="lcell-title">${esc(l.title)}</span>${cont?'<span class="lcell-tag">▶</span>':(done?'<span class="lcell-tag ok">✓</span>':'')}</div><div class="lcell-meta">${big?'🏁 ':''}${lc.known}/${l.words.length} · 🟢${lc.known} 🟡${lc.new+lc.learning}</div><div class="mini-track"><div class="mini-fill" style="width:${lp}%"></div></div></button>`;}).join("");
    return `<details class="folder"${fi===activeFolder?' open':''}><summary class="folder-sum"><span class="folder-name">📂 Папка ${fi+1}</span><span class="folder-info">Уроки ${first}–${last} · ${fw} слов · 🟢 ${fp}%</span></summary><div class="folder-grid">${cells}</div></details>`;}).join("");
  return `
  <section class="notion-stat-grid">
    <div class="notion-stat"><p class="notion-stat-label">Всего слов</p><p class="notion-stat-value">${total}</p><p class="notion-stat-caption">в ${COURSE.lessons.length} уроках</p></div>
    <div class="notion-stat"><p class="notion-stat-label">🟢 Знаю</p><p class="notion-stat-value">${c.known}</p><p class="notion-stat-caption">${pct}% от всех слов</p></div>
    <div class="notion-stat"><p class="notion-stat-label">🟡 Учу</p><p class="notion-stat-value">${c.new+c.learning}</p><p class="notion-stat-caption">в процессе</p></div>
  </section>
  <section><div class="notion-meter" style="--value:${pct}%"><div class="notion-meter-row"><span>Общий прогресс (выучено)</span><span>${pct}%</span></div><div class="notion-meter-track"><div class="notion-meter-fill"></div></div></div></section>
  <section>
    <div class="random-cta" onclick="startRandomReview()"><div class="random-cta-ico">🎲</div><div class="random-cta-txt"><b>Повторить случайные</b><span>10 случайных слов из невыученных — напиши перевод на английском</span></div><div class="random-cta-arrow">→</div></div>
  </section>
  <section>
    <div class="section-head"><h2>📚 Уроки</h2></div>
    <div class="legend"><span><span class="dot learning"></span>Учу</span><span><span class="dot known"></span>Знаю</span></div>
    <div class="folder-list">${folders}</div>
  </section>`;
}

/* ============================ LESSON CONTROLLER ============================ */
function openLesson(id){const l=COURSE.lessons.find(x=>x.id===id);const a=state.active;if(a&&a.id===id&&a.stage&&a.stage!=='done'){lesson={def:l,stage:a.stage,wordIdx:a.wordIdx||0,review:a.review||[],flash:a.flash||null,test:a.test||null,testIdx:a.testIdx||0};view={name:"lesson",arg:id};window.scrollTo(0,0);rerender();return;}if(lessonLearned(l)){lesson={def:l,stage:"menu",wordIdx:0,review:buildReview(l),flash:null,test:null,testIdx:0};view={name:"lesson",arg:id};window.scrollTo(0,0);rerender();return;}lesson={def:l,stage:"start",wordIdx:0,review:buildReview(l),flash:null,test:null,testIdx:0};view={name:"lesson",arg:id};window.scrollTo(0,0);if(lesson.review.length){startReview();}else{lesson.stage="words";rerender();}}
function saveActive(){if(!lesson)return;state.active={id:lesson.def.id,stage:lesson.stage,wordIdx:lesson.wordIdx,review:lesson.review,flash:lesson.flash,test:lesson.test,testIdx:lesson.testIdx};save();}
function clearActive(){state.active=null;save();}
function restartLesson(){if(confirm("Пройти весь урок заново? Снова покажу все карточки."))fullRetake();}
function fullRetake(){clearActive();lesson.review=buildReview(lesson.def);lesson.wordIdx=0;lesson.test=null;lesson.testIdx=0;if(lesson.review.length){startReview();}else{gotoWords();}}
function goMenu(){lesson.stage="menu";lesson.flash=null;lesson.test=null;window.scrollTo(0,0);rerender();}
function startWeakReview(){const weak=lesson.def.words.filter(o=>ws(o.w).status==='learning').map(o=>o.w);if(!weak.length){goMenu();return;}lesson.flash={ids:shuffle(weak),i:0,given:null,checked:false,correct:false,mode:'weak'};lesson.stage="review";window.scrollTo(0,0);rerender();}
function renderLessonMenu(){const l=lesson.def;const lc=counts(l.words);const weak=l.words.filter(o=>ws(o.w).status==='learning');const pct=Math.round(lc.known/l.words.length*100);
  return `<section>
    <div class="notion-callout" data-tone="green"><div>✅</div><div><strong>Урок пройден</strong><p>Выбери, что сделать — проходить всё заново необязательно.</p></div></div>
    <section class="notion-stat-grid" style="margin-top:12px">
      <div class="notion-stat"><p class="notion-stat-label">🟢 Знаю</p><p class="notion-stat-value">${lc.known}</p><p class="notion-stat-caption">${pct}% урока</p></div>
      <div class="notion-stat"><p class="notion-stat-label">🟡 Учу</p><p class="notion-stat-value">${lc.new+lc.learning}</p><p class="notion-stat-caption">нужно закрепить</p></div>
      <div class="notion-stat"><p class="notion-stat-label">Всего</p><p class="notion-stat-value">${l.words.length}</p><p class="notion-stat-caption">слов</p></div>
    </section>
    <div class="menu-actions">
      ${weak.length?`<button class="menu-btn primary" onclick="startWeakReview()"><span class="menu-ico">🔁</span><span><b>Повторить слабые слова</b><small>В статусе «Учу»: ${weak.length}</small></span></button>`:`<button class="menu-btn primary" onclick="startTest()"><span class="menu-ico">🎉</span><span><b>Все слова выучены</b><small>Закрепи быстрым тестом</small></span></button>`}
      <button class="menu-btn" onclick="startTest()"><span class="menu-ico">📝</span><span><b>Пройти тест заново</b><small>Проверка на ввод и перевод</small></span></button>
      <button class="menu-btn" onclick="fullRetake()"><span class="menu-ico">📚</span><span><b>Пройти весь урок заново</b><small>Все ${l.words.length} карточек с начала</small></span></button>
    </div>
  </section>`;}
function stepper(active){const steps=[["review","🔁 Повтор"],["words","🆕 Слова"],["test","📝 Тест"]];return `<div class="stepper">${steps.map(s=>`<span class="step ${active===s[0]?'on':''}">${s[1]}</span>`).join('<span class="step-sep">→</span>')}</div>`;}
function renderLesson(){const l=lesson.def;if(!l)return renderHome();
  const active = lesson.stage==="done"?"test":lesson.stage;
  const head=`<section style="margin-top:0">
    <div class="lesson-top"><button class="crumb" onclick="go('home')">← Все уроки</button>${lesson.stage==="menu"?"":`<button class="crumb" onclick="restartLesson()">↺ Начать заново</button>`}</div>
    <div class="row-between" style="margin-top:6px"><h1 style="font-size:clamp(28px,5vw,40px);margin:0">${esc(l.title)} — ${esc(l.theme)}</h1><span class="notion-badge" data-variant="blue">Фаза ${l.phase}</span></div>
    ${lesson.stage==="menu"?"":stepper(active)}
  </section>`;
  let body="";
  if(lesson.stage==="menu")body=renderLessonMenu();
  else if(lesson.stage==="start")body=renderStart();
  else if(lesson.stage==="review")body=renderReview();
  else if(lesson.stage==="words")body=renderWord();
  else if(lesson.stage==="test")body=renderTest();
  else body=renderDone();
  return head+body;
}
function renderStart(){const l=lesson.def;const lc=counts(l.words);const big=l.id%5===0;
  return `<section>
    <div class="notion-callout" data-tone="blue"><div>▶️</div><div><strong>Как пройти урок</strong><p>Сначала (по желанию) повтори прошлые слова, затем пройди ${l.words.length} карточек одну за другой, отмечая статус. В конце — ${big?'расширенный контрольный':'короткий'} авто-тест.</p></div></div>
    <div class="notion-muted" style="margin:10px 0">Статус слов урока: 🟢 ${lc.known} знаю · 🟡 ${lc.new+lc.learning} учу</div>
    <div class="test-actions" style="justify-content:flex-start">
      ${lesson.review.length?`<button class="ghost-btn" onclick="startReview()">🔁 Повторить прошлые слова (${lesson.review.length})</button>`:''}
      <button onclick="gotoWords()">▶ Начать урок (${l.words.length} слов)</button>
    </div></section>`;}
function startReview(){lesson.stage="review";lesson.flash={ids:shuffle(lesson.review),i:0,given:null,checked:false,correct:false};rerender();}
function gotoWords(){lesson.stage="words";lesson.wordIdx=0;window.scrollTo(0,0);rerender();}

/* ----- review (flashcards) ----- */
function buildReview(l){const prev=wordsBefore(l.id);const learn=prev.filter(o=>{const st=ws(o.w).status;return st==="new"||st==="learning";});const known=prev.filter(o=>ws(o.w).status==="known");const rk=shuffle(known).slice(0,COURSE.randomKnownCheck);return shuffle(learn.concat(rk)).map(o=>o.w);}
function renderReview(){const f=lesson.flash;
  if(f.i>=f.ids.length)return `<section><div class="flash-wrap"><div class="flash-card"><div class="flash-main">✅</div><div class="flash-sub">Повторение завершено!</div></div><div class="flash-actions"><button onclick="${f.mode==='weak'?'goMenu()':'gotoWords()'}">${f.mode==='weak'?'✓ Готово':'▶ К новым словам урока'}</button></div></div></section>`;
  const w=f.ids[f.i];const o=findWord(w);
  const prompt=`<div class="tag-check">проверка</div><div class="flash-prompt-label">переведи на английский</div><div class="flash-main">${esc(o.ru)}</div>`;
  let body,actions;
  if(!f.checked){
    body=`<input id="rev" class="rev-input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="напишите слово по-английски" onkeydown="if(event.key==='Enter'){event.preventDefault();checkReview();}">`;
    actions=`<button onclick="checkReview()">Проверить</button><button class="speak" onclick="speak('${o.w}')">🔊</button>`;
  } else {
    const fb=f.correct?`<div class="rev-fb good">✅ Верно!</div>`:`<div class="rev-fb bad">❌ Вы написали: <s>${esc(f.given||'—')}</s></div>`;
    body=`${fb}<div class="flash-main">${esc(o.w)}</div><div class="flash-ipa">${esc(o.ipa)}</div><div class="flash-sub">${esc(o.ru)}</div><div class="flash-ex">${esc(ex1(o))}</div>`;
    actions=f.correct?`<div class="rev-rate-q">Насколько хорошо помните слово?</div><button class="btn-good" onclick="reviewRate('known')">🟢 Запомнил</button><button class="btn-warn" onclick="reviewRate('unsure')">🟡 Не уверен</button><button class="speak" onclick="speak('${o.w}')">🔊</button>`:`<button onclick="reviewNext()">Дальше →</button><button class="speak" onclick="speak('${o.w}')">🔊</button>`;
  }
  return `<section><div class="flash-wrap"><p class="flash-progress">Повторение · ${f.i+1} / ${f.ids.length}</p><div class="flash-card">${prompt}${body}</div><div class="flash-actions">${actions}</div></div></section>`;}
function checkReview(){const f=lesson.flash;if(f.checked)return;const el=document.getElementById('rev');const v=el?el.value:'';f.given=v;f.correct=norm(v)===norm(findWord(f.ids[f.i]).w);f.checked=true;if(!f.correct){recall(f.ids[f.i],false);}rerender();}
function reviewRate(kind){const w=lesson.flash.ids[lesson.flash.i];if(kind==='known'){recall(w,true);}else{setStatus(w,'learning');}reviewNext();}
function reviewNext(){lesson.flash.i++;lesson.flash.given=null;lesson.flash.checked=false;lesson.flash.correct=false;rerender();}

/* ----- word sequence ----- */
function exsOf(o){if(Array.isArray(o.exs)&&o.exs.length)return o.exs;if(o.ex)return [{en:o.ex,ru:o.exRu||''}];return [];}
function ex1(o){var e=exsOf(o);return e.length?e[0].en:'';}
function exRu1(o){var e=exsOf(o);return e.length?e[0].ru:'';}
function exHtml(o){return exsOf(o).map(function(e){return '<div class="w-ex-item"><div class="w-ex">'+esc(e.en)+'</div><div class="w-exru">'+esc(e.ru)+'</div></div>';}).join('');}
function renderWord(){const l=lesson.def;const i=lesson.wordIdx;const o=l.words[i];const st=ws(o.w).status;const pct=Math.round((i)/l.words.length*100);
  return `<section>
    <div class="seq-count">Слово ${i+1} из ${l.words.length} · текущий статус: ${LABEL[st]}</div>
    <div class="seq-bar"><div class="seq-fill" style="width:${pct}%"></div></div>
    <div class="card-big">
      <div class="w-en">${esc(o.w)}</div>
      <div class="w-ipa">${esc(o.ipa)}</div>
      <button class="speak-lg" onclick="speak('${o.w}')">🔊 Произнести</button>
      <div class="w-ru">${esc(o.ru)}</div>
      ${exHtml(o)}
      <div class="status-btns">
        <button class="s-known" onclick="markNext('known')">🟢 Я уже знаю</button>
        <button class="s-learn" onclick="markNext('learning')">📖 Учить →</button>
      </div>
    </div>
    <div class="seq-nav">${i>0?`<button onclick="prevWord()">← Предыдущее слово</button>`:''}</div>
  </section>`;}
function markNext(status){setStatus(lesson.def.words[lesson.wordIdx].w,status);lesson.wordIdx++;if(lesson.wordIdx>=lesson.def.words.length){startTest();}else{window.scrollTo(0,0);rerender();}}
function prevWord(){if(lesson.wordIdx>0){lesson.wordIdx--;window.scrollTo(0,0);rerender();}}

/* ----- test engine ----- */
function distractors(pool,o,field,n){return shuffle(pool.filter(x=>x.w!==o.w)).slice(0,n).map(x=>x[field]);}
function gapText(o){const parts=ex1(o).split(' ');const target=o.w.toLowerCase();let done=false;return parts.map(p=>{if(!done){const clean=p.toLowerCase().replace(/[.,!?;:]/g,'');if(clean===target){done=true;const punct=p.replace(/[a-zA-Z'-]/g,'');return '<b>_____</b>'+esc(punct);}}return esc(p);}).join(' ');}
function buildTest(l,customList){
  const milestone=l.id%5===0;
  const pool=milestone?wordsUpTo(l.id):l.words;
  let chosen;
  if(customList&&customList.length){chosen=customList;}
  else{const base=milestone?18:10;chosen=shuffle(pool).slice(0,Math.min(base,pool.length));}
  const seq=['type','gap','type','ru2en','gap','type','en2ru','gap'];
  return chosen.map((o,i)=>{const type=seq[i%seq.length];let options=null,answer,isChoice=false;
    if(type==='en2ru'){answer=o.ru;options=shuffle([o.ru].concat(distractors(pool,o,'ru',3)));isChoice=true;}
    else if(type==='ru2en'){answer=o.w;options=shuffle([o.w].concat(distractors(pool,o,'w',3)));isChoice=true;}
    else{answer=o.w;}
    return {o,type,options,answer,isChoice,given:null,checked:false,correct:false};});
}
function startTest(custom){lesson.test=buildTest(lesson.def,custom);lesson.testIdx=0;lesson.stage="test";window.scrollTo(0,0);rerender();}
function renderTest(){const t=lesson.test;const i=lesson.testIdx;const q=t[i];const o=q.o;const done=t.slice(0,i).filter(x=>x.correct).length;
  let prompt='';
  if(q.type==='en2ru')prompt=`<div class="qprompt-label">Что означает слово</div><div class="qprompt-main">${esc(o.w)} <button class="speak" onclick="speak('${o.w}')">🔊</button></div><div class="qprompt-sub">${esc(o.ipa)}</div>`;
  else if(q.type==='ru2en')prompt=`<div class="qprompt-label">Переведите на английский</div><div class="qprompt-main">${esc(o.ru)}</div>`;
  else if(q.type==='gap')prompt=`<div class="qprompt-label">Вставьте пропущенное слово</div><div class="qprompt-main" style="font-size:22px">${gapText(o)}</div><div class="qprompt-sub">${esc(exRu1(o))}</div>`;
  else prompt=`<div class="qprompt-label">Напишите по-английски</div><div class="qprompt-main">${esc(o.ru)}</div>`;
  let body='';
  if(q.isChoice){
    body=`<div class="opts">${q.options.map((opt,oi)=>{let cls='';if(q.checked){if(opt===q.answer)cls='opt-correct';else if(opt===q.given)cls='opt-wrong';}return `<button class="opt ${cls}" ${q.checked?'disabled':''} onclick="answerChoice(${oi})">${esc(opt)}</button>`;}).join('')}</div>`;
  } else {
    body = q.checked? '' : `<div class="ans-input"><input id="ans" autocomplete="off" placeholder="введите слово" onkeydown="if(event.key==='Enter')answerType()"><button onclick="answerType()">Проверить</button></div>`;
  }
  let fb='';
  if(q.checked){fb=q.correct?`<div class="feedback ok">✅ Верно!</div>`:`<div class="feedback no">❌ Неверно. Правильно: <u>${esc(q.answer)}</u><small>${esc(o.w)} ${esc(o.ipa)} — ${esc(o.ru)}. ${esc(ex1(o))}</small></div>`;}
  const nextLabel=i<t.length-1?'Далее →':'Показать результаты';
  const actions=q.checked?`<div class="test-actions"><button onclick="nextQuestion()">${nextLabel}</button></div>`:'';
  return `<section>
    <div class="seq-count">Вопрос ${i+1} из ${t.length} · верно: ${done}</div>
    <div class="seq-bar"><div class="seq-fill" style="width:${Math.round(i/t.length*100)}%"></div></div>
    <div class="card-big">${prompt}${body}${fb}</div>
    ${actions}
  </section>`;}
function answerChoice(idx){const q=lesson.test[lesson.testIdx];if(q.checked)return;q.given=q.options[idx];q.checked=true;q.correct=(q.given===q.answer);recall(q.o.w,q.correct);rerender();}
function answerType(){const q=lesson.test[lesson.testIdx];if(q.checked)return;const el=document.getElementById('ans');const v=el?el.value:'';q.given=v;q.checked=true;q.correct=(norm(v)===norm(q.answer));recall(q.o.w,q.correct);rerender();}
function nextQuestion(){if(lesson.testIdx<lesson.test.length-1){lesson.testIdx++;window.scrollTo(0,0);rerender();}else{lesson.stage="done";window.scrollTo(0,0);rerender();}}

/* ----- results ----- */
function renderDone(){const t=lesson.test;const correct=t.filter(q=>q.correct).length;const pct=Math.round(correct/t.length*100);const missed=t.filter(q=>!q.correct).map(q=>q.o);const uniqMissed=[...new Map(missed.map(o=>[o.w,o])).values()];
  const grade=pct>=90?'Отлично! 🏆':pct>=70?'Хорошо! 👍':pct>=50?'Неплохо, но потренируйся ещё 💪':'Стоит повторить урок 🔁';
  const missHtml=uniqMissed.length?`<div class="missed-list">${uniqMissed.map(o=>`<div class="missed-row"><b>${esc(o.w)}</b><span class="notion-muted">${esc(o.ipa)}</span><span>— ${esc(o.ru)}</span></div>`).join('')}</div>`:`<p class="notion-muted">Ошибок нет — отличная работа!</p>`;
  return `<section><div class="card-big result-big">
    <div class="score-num">${pct}%</div>
    <p class="notion-muted" style="margin-top:6px">${correct} из ${t.length} верно · ${grade}</p>
  </div>
  <div class="section-head"><h2>Слова на повторение</h2></div>${missHtml}
  <div class="test-actions" style="margin-top:22px">
    ${uniqMissed.length?`<button onclick='startTest(${JSON.stringify(uniqMissed)})'>🔁 Повторить ошибки (${uniqMissed.length})</button>`:''}
    <button class="ghost-btn" onclick="go('home')">✓ Завершить урок</button>
  </div></section>`;}

function resetProgress(){if(confirm("Сбросить весь прогресс изучения слов?")){state={words:{}};save();lesson=null;go("home");}}

/* ============================ BACKUP / ПЕРЕНОС ============================ */
function exportCode(){try{return btoa(unescape(encodeURIComponent(JSON.stringify(state))));}catch(e){return JSON.stringify(state);}}
function applyImport(data){if(data&&typeof data==="object"&&data.words){state=data;save();return true;}return false;}
function copyExport(){const t=document.getElementById("expcode");if(!t)return;t.focus();t.select();try{document.execCommand("copy");}catch(e){}if(navigator.clipboard){navigator.clipboard.writeText(t.value).then(function(){},function(){});}alert("Код скопирован. Перешли его себе и вставь на другом устройстве.");}
function downloadBackup(){try{const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="english-progress.json";document.body.appendChild(a);a.click();a.remove();}catch(e){alert("Не удалось скачать файл.");}}
function doImport(){const el=document.getElementById("impcode");const v=(el?el.value:"").trim();if(!v){alert("Сначала вставь код резервной копии.");return;}let data=null;try{data=JSON.parse(decodeURIComponent(escape(atob(v))));}catch(e){try{data=JSON.parse(v);}catch(e2){}}if(applyImport(data)){alert("Прогресс восстановлен!");go("home");}else{alert("Не получилось прочитать код. Скопируй его полностью и попробуй снова.");}}
function importFile(input){const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=function(){let data=null;try{data=JSON.parse(r.result);}catch(e){}if(applyImport(data)){alert("Прогресс восстановлен из файла!");go("home");}else{alert("Файл не подходит.");}};r.readAsText(f);}
function renderBackup(){const code=exportCode();const all=allWords();const c=counts(all);
  return `<section style="margin-top:0">
    <button class="crumb" onclick="go('home')">← На главную</button>
    <h1 style="font-size:clamp(28px,5vw,40px);margin:8px 0 0">💾 Перенос прогресса</h1>
    <p class="notion-lede">Прогресс хранится внутри этого браузера. Чтобы продолжить на телефоне или в другом браузере — сохрани копию здесь и восстанови её на другом устройстве. Сейчас: 🟢 ${c.known} знаю · 🟡 ${c.new+c.learning} учу.</p>
    <div class="notion-callout" data-tone="green"><div>☁️</div><div><strong>Синхронизация включена</strong><p>В Telegram прогресс хранится в облаке твоего аккаунта и синхронизируется между устройствами автоматически. Код и файл ниже — резервная копия на всякий случай.</p></div></div>
    <div class="section-head"><h2>1. Сохранить (на этом устройстве)</h2></div>
    <div class="backup-box">
      <textarea id="expcode" readonly onclick="this.select()">${esc(code)}</textarea>
      <div class="test-actions" style="justify-content:flex-start"><button onclick="copyExport()">📋 Скопировать код</button><button class="ghost-btn" onclick="downloadBackup()">⬇️ Скачать файл</button></div>
    </div>
    <div class="section-head"><h2>2. Восстановить (на новом устройстве)</h2></div>
    <div class="backup-box">
      <textarea id="impcode" placeholder="Вставь сюда код резервной копии"></textarea>
      <div class="test-actions" style="justify-content:flex-start"><button onclick="doImport()">✅ Восстановить из кода</button><label class="ghost-btn file-label">📂 Загрузить файл<input type="file" accept=".json,application/json" onchange="importFile(this)" hidden></label></div>
    </div>
    <div class="notion-callout" data-tone="blue"><div>📱</div><div><strong>Как учить на телефоне</strong><p>1) Открой этот же файл english-course.html на телефоне (отправь его себе в мессенджере/почтой/через облако и открой в браузере). 2) Здесь, на компьютере, нажми «Скопировать код» и перешли его себе. 3) На телефоне открой «💾 Прогресс» → вставь код → «Восстановить». Для обратного переноса повтори в другую сторону.</p></div></div>
  </section>`;}
(function(){var t=window.Telegram&&window.Telegram.WebApp;
if(t){try{t.ready();t.expand();}catch(e){}try{var p=t.themeParams||{};var r=document.documentElement;if(p.bg_color){r.style.setProperty('--notion-bg',p.bg_color);}if(p.secondary_bg_color){r.style.setProperty('--notion-surface',p.secondary_bg_color);}if(p.text_color){r.style.setProperty('--notion-text',p.text_color);}if(t.colorScheme==='dark'){document.body.classList.add('tg-dark');}}catch(e){}}
function start(){rerender();}
cloudLoad(function(s){if(s){try{var d=JSON.parse(s);if(d&&d.words){state=d;try{localStorage.setItem(SKEY,s);}catch(e){}}}catch(e){}}start();});})();
</script>
</body>
